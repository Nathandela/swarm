name: CI

on:
  push:
  pull_request:

jobs:
  docs:
    name: docs (required files)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify required documentation files exist
        run: |
          for f in AGENTS.md docs/INDEX.md docs/governance/PROVENANCE.md; do
            if [ ! -f "$f" ]; then
              echo "missing required file: $f"
              exit 1
            fi
          done

  lint:
    name: lint (golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        if: hashFiles('go.mod') != ''
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run golangci-lint
        if: hashFiles('go.mod') != ''
        uses: golangci/golangci-lint-action@v6

  test:
    name: test (go test ./...)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        if: hashFiles('go.mod') != ''
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run tests
        if: hashFiles('go.mod') != ''
        run: go test ./...
