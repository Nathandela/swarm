name: CI

on:
  push:
  pull_request:

jobs:
  docs:
    name: docs (required files)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify required documentation files exist
        run: |
          for f in AGENTS.md docs/INDEX.md docs/governance/PROVENANCE.md; do
            if [ ! -f "$f" ]; then
              echo "missing required file: $f"
              exit 1
            fi
          done

  lint:
    name: lint (golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64

  test:
    name: test (go test ./...)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Vet (GG-4)
        run: go vet ./...
      - name: Run tests
        run: go test -race ./...

  build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [darwin, linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build swarm binary (CGO_ENABLED=0)
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o swarm-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/swarm
      # E1.2 static-linking assertion runs on the linux targets only: `file` on
      # this ubuntu runner reads ELF metadata, so "statically linked" is
      # meaningful for GOOS=linux (including the cross-built arm64 ELF). Darwin
      # cross-builds produce Mach-O, which the ELF-oriented `file` here cannot
      # classify; the honest darwin check (system-libraries-only via otool) runs
      # natively in the build-darwin job below.
      - name: Assert linux binary is statically linked (E1.2)
        if: matrix.goos == 'linux'
        run: |
          file swarm-${{ matrix.goos }}-${{ matrix.goarch }}
          file swarm-${{ matrix.goos }}-${{ matrix.goarch }} | grep -q "statically linked"

  # darwin cannot be fully static (no static libSystem); E1.2 is interpreted as:
  # fully static ELF on linux, system-libraries-only on darwin.
  build-darwin:
    name: build-darwin (darwin/${{ matrix.goarch }})
    runs-on: macos-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build darwin binary (CGO_ENABLED=0)
        env:
          CGO_ENABLED: '0'
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
        run: go build -o swarm-darwin-${{ matrix.goarch }} ./cmd/swarm
      - name: Assert darwin binary links only system libraries (E1.2)
        run: |
          otool -L swarm-darwin-${{ matrix.goarch }}
          libs=$(otool -L swarm-darwin-${{ matrix.goarch }} | tail -n +2 | awk '{print $1}')
          bad=$(echo "$libs" | grep -vE '^/usr/lib/(libSystem|libresolv)' || true)
          if [ -n "$bad" ]; then
            echo "E1.2 violation: binary links non-system dylibs:"
            echo "$bad"
            exit 1
          fi
