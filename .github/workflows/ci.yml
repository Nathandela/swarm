name: CI

on:
  push:
  pull_request:

jobs:
  docs:
    name: docs (required files)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify required documentation files exist
        run: |
          for f in AGENTS.md docs/INDEX.md docs/governance/PROVENANCE.md; do
            if [ ! -f "$f" ]; then
              echo "missing required file: $f"
              exit 1
            fi
          done

  lint:
    name: lint (golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64

  test:
    name: test (go test ./...)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Run tests
        run: go test -race ./...

  build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [darwin, linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build (CGO_ENABLED=0)
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build ./...
