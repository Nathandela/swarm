name: CI

on:
  push:
  pull_request:

jobs:
  docs:
    name: docs (required files)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify required documentation files exist
        run: |
          for f in AGENTS.md docs/INDEX.md docs/governance/PROVENANCE.md; do
            if [ ! -f "$f" ]; then
              echo "missing required file: $f"
              exit 1
            fi
          done

  lint:
    name: lint (golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64

  test:
    name: test (go test ./...)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Vet (GG-4)
        run: go vet ./...
      - name: Run tests
        run: go test -race ./...
      # E10.6: exercise the REAL linux CPU sampler (/proc) against live processes.
      # The parser UNIT tests run above (untagged); this covers the syscall path.
      - name: CPU sampler integration (E10.6, linux /proc)
        run: go test -tags integration -race ./internal/engine/

  # E10.6: the darwin half. The pure CPU parsers run in the unit step (untagged, on
  # every runner), and the integration step exercises the REAL proc_pidinfo syscall
  # natively, so BOTH platform sampler paths are actually verified in CI.
  test-darwin:
    name: test-darwin (macos)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Engine + hookclient unit tests (incl. darwin CPU parser)
        run: go test -race ./internal/engine/... ./internal/hookclient/...
      - name: CPU sampler integration (E10.6, darwin proc_pidinfo)
        run: go test -tags integration -race ./internal/engine/

  # E14.5: active fuzzing (not just the seed corpus already covered by the
  # untagged `go test` above). `-fuzz` runs exactly one target per invocation
  # and its regex must match a single Fuzz func, so each target gets its own
  # step; `-run '^$'` skips the normal tests so the step only fuzzes.
  fuzz:
    name: fuzz (active, bounded fuzztime)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Fuzz FuzzRoundTrip (internal/wire)
        run: go test -run '^$' -fuzz '^FuzzRoundTrip$' -fuzztime=30s ./internal/wire
      - name: Fuzz FuzzReadFrame (internal/wire)
        run: go test -run '^$' -fuzz '^FuzzReadFrame$' -fuzztime=30s ./internal/wire
      - name: Fuzz FuzzFeedSplitConsistency (internal/vt)
        run: go test -run '^$' -fuzz '^FuzzFeedSplitConsistency$' -fuzztime=30s ./internal/vt
      - name: Fuzz FuzzExtractConversationIDTotality (internal/adapter)
        run: go test -run '^$' -fuzz '^FuzzExtractConversationIDTotality$' -fuzztime=30s ./internal/adapter
      - name: Fuzz FuzzReferenceExtractConversationIDTotality (internal/adapter/refadapter)
        run: go test -run '^$' -fuzz '^FuzzReferenceExtractConversationIDTotality$' -fuzztime=30s ./internal/adapter/refadapter

  build:
    name: build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [darwin, linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build swarm binary (CGO_ENABLED=0)
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -o swarm-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/swarm
      # E1.2 static-linking assertion runs on the linux targets only: `file` on
      # this ubuntu runner reads ELF metadata, so "statically linked" is
      # meaningful for GOOS=linux (including the cross-built arm64 ELF). Darwin
      # cross-builds produce Mach-O, which the ELF-oriented `file` here cannot
      # classify; the honest darwin check (system-libraries-only via otool) runs
      # natively in the build-darwin job below.
      - name: Assert linux binary is statically linked (E1.2)
        if: matrix.goos == 'linux'
        run: |
          file swarm-${{ matrix.goos }}-${{ matrix.goarch }}
          file swarm-${{ matrix.goos }}-${{ matrix.goarch }} | grep -q "statically linked"

  # darwin cannot be fully static (no static libSystem); E1.2 is interpreted as:
  # fully static ELF on linux, system-libraries-only on darwin.
  build-darwin:
    name: build-darwin (darwin/${{ matrix.goarch }})
    runs-on: macos-latest
    strategy:
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build darwin binary (CGO_ENABLED=0)
        env:
          CGO_ENABLED: '0'
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
        run: go build -o swarm-darwin-${{ matrix.goarch }} ./cmd/swarm
      - name: Assert darwin binary links only system libraries (E1.2)
        run: |
          otool -L swarm-darwin-${{ matrix.goarch }}
          libs=$(otool -L swarm-darwin-${{ matrix.goarch }} | tail -n +2 | awk '{print $1}')
          bad=$(echo "$libs" | grep -vE '^/usr/lib/(libSystem|libresolv)' || true)
          if [ -n "$bad" ]; then
            echo "E1.2 violation: binary links non-system dylibs:"
            echo "$bad"
            exit 1
          fi

  # E13.1: the RELEASE pipeline itself (.goreleaser.yaml), as opposed to the
  # plain `go build` matrix above — a dry-run snapshot proves it produces the 4
  # static artifacts + checksums without publishing anything (--skip=publish,
  # no tag/token needed), and re-asserts N-4 (zero runtime deps) on its actual
  # output via both `file` and `ldd` on the linux/amd64 artifact.
  release-dryrun:
    name: release dry-run (goreleaser snapshot, E13.1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        # Pinned exactly (not the floating '1.24' the other jobs use): this is
        # the release pipeline, so its toolchain should be reproducible.
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.2'
      - name: Set up goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          install-only: true
          version: '2.17.0' # the version verified locally for this config
      - name: Validate .goreleaser.yaml
        run: goreleaser check
      - name: Snapshot release (build + archive + checksum, no publish)
        run: goreleaser release --snapshot --clean --skip=publish
      - name: Assert 4 static artifacts + a checksums file exist (E13.1)
        run: |
          count=$(find dist -maxdepth 1 -name 'swarm_*.tar.gz' | wc -l)
          echo "archives: $count"
          test "$count" -eq 4
          test -f dist/checksums.txt
      - name: Verify archives against checksums.txt (E13.1)
        working-directory: dist
        run: sha256sum -c checksums.txt
      - name: Assert linux artifacts are statically linked (N-4)
        run: |
          for arch in amd64 arm64; do
            bin=$(find dist -type f -name swarm -path "*linux_${arch}*" | head -n1)
            test -n "$bin"
            file "$bin"
            file "$bin" | grep -q "statically linked"
          done
      - name: Assert linux/amd64 artifact has zero runtime deps via ldd (N-4)
        run: |
          bin=$(find dist -type f -name swarm -path '*linux_amd64*' | head -n1)
          out=$(ldd "$bin" 2>&1 || true)
          echo "$out"
          if ! echo "$out" | grep -q "not a dynamic executable"; then
            echo "N-4 violation: ldd reports linux/amd64 binary has dynamic dependencies"
            exit 1
          fi
      - name: Verify `go install ./cmd/swarm` builds and runs (E13.3)
        run: |
          tmp=$(mktemp -d)
          GOBIN="$tmp" go install ./cmd/swarm
          "$tmp/swarm" version
          "$tmp/swarm" version | grep -q "swarm "
